<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>殿下的濾鏡收藏館</title>
    <style>
        body {
            margin: 0;
            background-color: #f0f0f0;
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
        }

        h1 { color: #333; margin-bottom: 40px; }

        /* 每組對比的獨立外框 */
        .comparison-wrapper {
            margin-bottom: 60px;
            width: 90vw;
            max-width: 800px;
        }

        .comparison-container {
            position: relative;
            width: 100%;
            aspect-ratio: 2 / 3; 
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            background-color: #fff;
            --pos: 50%; /* 每個容器獨立的變數 */
        }

        .comparison-container img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .image-background { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .image-foreground {
            position: absolute; top: 0; left: 0;
            width: var(--pos);
            height: 100%;
            z-index: 2;
            overflow: hidden;
            border-right: 3px solid rgba(255,255,255,0.8);
        }

        /* 修正內部圖片不隨父層縮放 */
        .image-foreground img { width: 90vw; max-width: 800px; }

        .slider {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            -webkit-appearance: none; appearance: none;
            background: transparent; z-index: 4; cursor: ew-resize; margin: 0;
        }

        .slider-button {
            position: absolute; top: 50%; left: var(--pos);
            transform: translate(-50%, -50%);
            width: 40px; height: 40px;
            background: white; border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            z-index: 3; pointer-events: none;
            display: flex; justify-content: center; align-items: center;
        }

        .slider-button::after { content: '↔'; color: #888; font-weight: bold; }

        .title-tag {
            margin-top: 15px;
            font-size: 18px;
            color: #555;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>✨ 朦朧美學對比館 ✨</h1>

    <div class="comparison-wrapper">
        <div class="comparison-container">
            <div class="image-background"><img src="https://raw.githubusercontent.com/ChadChenYu/18/master/045509_00001_.png"></div>
            <div class="image-foreground"><img src="https://raw.githubusercontent.com/ChadChenYu/18/master/ComfyUI_temp_tylna_00030_.png"></div>
            <input type="range" min="0" max="100" value="50" class="slider">
            <div class="slider-button"></div>
        </div>
        <div class="title-tag">第一卷：書房裡的靈動神韻比對</div>
    </div>


    
    <div class="comparison-wrapper">
        <div class="comparison-container">
            <div class="image-background"><img src="https://raw.githubusercontent.com/ChadChenYu/18/master/1.png"></div>
            <div class="image-foreground"><img src="https://raw.githubusercontent.com/ChadChenYu/18/master/2.png"></div>
            <input type="range" min="0" max="100" value="50" class="slider">
            <div class="slider-button"></div>
        </div>
        <div class="title-tag">第二卷：讀書的女孩細節比對</div>
    </div>


    
        <div class="comparison-wrapper">
        <div class="comparison-container">
            <div class="image-background"><img src="https://raw.githubusercontent.com/ChadChenYu/18/master/3.png"></div>
            <div class="image-foreground"><img src="https://raw.githubusercontent.com/ChadChenYu/18/master/4.png"></div>
            <input type="range" min="0" max="100" value="50" class="slider">
            <div class="slider-button"></div>
        </div>
        <div class="title-tag">第三卷：持槍軍人細節比對</div>
    </div>


    

    
        <div class="comparison-wrapper">
        <div class="comparison-container">
            <div class="image-background"><img src=""></div>
            <div class="image-foreground"><img src=""></div>
            <input type="range" min="0" max="100" value="50" class="slider">
            <div class="slider-button"></div>
        </div>
        <div class="title-tag">第四卷：殿下的新收藏</div>


            
    </div>


    
        <div class="comparison-wrapper">
        <div class="comparison-container">
            <div class="image-background"><img src=""></div>
            <div class="image-foreground"><img src=""></div>
            <input type="range" min="0" max="100" value="50" class="slider">
            <div class="slider-button"></div>
        </div>
        <div class="title-tag">第五卷：殿下的新收藏</div>
    </div>


    
    <script>
        // 自動為頁面上所有的滑塊綁定功能
        document.querySelectorAll('.comparison-wrapper').forEach(wrapper => {
            const slider = wrapper.querySelector('.slider');
            const container = wrapper.querySelector('.comparison-container');
            
            slider.addEventListener('input', (e) => {
                container.style.setProperty('--pos', e.target.value + '%');
            });
        });
    </script>

</body>
</html>
