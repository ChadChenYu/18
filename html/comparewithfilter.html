<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公主殿下的濾鏡收藏館</title>
    <style>
        /* ... (保留原本的 body, h1, .comparison-wrapper 等樣式) ... */
        body { margin: 0; background-color: #f0f0f0; font-family: "Microsoft JhengHei", sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 0; scroll-behavior: smooth; /* 增加平滑捲動效果 */ }
        h1 { color: #333; margin-bottom: 40px; }
        .comparison-wrapper { margin-bottom: 60px; width: 90vw; max-width: 800px; }
        .comparison-container { position: relative; width: 100%; aspect-ratio: 2 / 3; overflow: hidden; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); background-color: #fff; --pos: 50%; }
        
        /* 圖片對齊核心：確保填滿且預設置中 */
        .comparison-container img {
            display: block; width: 100%; height: 100%;
            object-fit: cover;
            object-position: center; /* 讓圖片的中心點對齊 */
            pointer-events: none;
        }

        .image-background { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .image-foreground { position: absolute; top: 0; left: 0; width: var(--pos); height: 100%; z-index: 2; overflow: hidden; border-right: 3px solid rgba(255,255,255,0.8); }
        .image-foreground img { width: 90vw; max-width: 800px; }
        .slider { position: absolute; top: 0; left: 0; width: 100%; height: 100%; -webkit-appearance: none; appearance: none; background: transparent; z-index: 4; cursor: ew-resize; margin: 0; }
        .slider-button { position: absolute; top: 50%; left: var(--pos); transform: translate(-50%, -50%); width: 40px; height: 40px; background: white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.2); z-index: 3; pointer-events: none; display: flex; justify-content: center; align-items: center; }
        .slider-button::after { content: '↔'; color: #888; font-weight: bold; }
        .title-tag { margin-top: 15px; font-size: 18px; color: #555; text-align: center; font-weight: bold; }

        /* ================================ */
        /* 👑 殿下御用飛梭導航 (懸浮選單) 👑 */
        /* ================================ */
        .nav-menu {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            padding: 15px;
            z-index: 100;
            backdrop-filter: blur(5px);
            transition: transform 0.3s ease;
        }

        .nav-title {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
        }

        .nav-menu ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-menu li { margin-bottom: 8px; }

        .nav-menu a {
            text-decoration: none;
            color: #555;
            font-size: 14px;
            display: block;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.2s, color 0.2s;
        }

        .nav-menu a:hover {
            background: #e0e0e0;
            color: #000;
        }

        /* 手機版自動隱藏或縮小選單 (避免擋住圖片) */
        @media (max-width: 768px) {
            .nav-menu {
                bottom: 15px;
                right: 15px;
                padding: 10px;
            }
            .nav-menu a { font-size: 12px; padding: 4px 8px; }
        }
    </style>
</head>
<body>

    <h1 id="top">✨ 朦朧美學對比館 ✨</h1>

    <div class="comparison-wrapper" id="vol-1">
        <div class="comparison-container">
            <div class="image-background"><img src="https://raw.githubusercontent.com/ChadChenYu/18/master/045509_00001_.png" style="object-position: center top;"></div>
            <div class="image-foreground"><img src="https://raw.githubusercontent.com/ChadChenYu/18/master/ComfyUI_temp_tylna_00030_.png" style="object-position: center top;"></div>
            <input type="range" min="0" max="100" value="50" class="slider">
            <div class="slider-button"></div>
        </div>
        <div class="title-tag">第一卷：書房裡的靈動神韻</div>
    </div>

    <div class="comparison-wrapper" id="vol-2">
        <div class="comparison-container">
            <div class="image-background"><img src="https://raw.githubusercontent.com/ChadChenYu/18/master/1.png"></div>
            <div class="image-foreground"><img src="https://raw.githubusercontent.com/ChadChenYu/18/master/2.png"></div>
            <input type="range" min="0" max="100" value="50" class="slider">
            <div class="slider-button"></div>
        </div>
        <div class="title-tag">第二卷：讀書女孩細節</div>
    </div>

    <div class="comparison-wrapper" id="vol-3">
        <div class="comparison-container">
            <div class="image-background"><img src="https://raw.githubusercontent.com/ChadChenYu/18/master/3.png"></div>
            <div class="image-foreground"><img src="https://raw.githubusercontent.com/ChadChenYu/18/master/4.png"></div>
            <input type="range" min="0" max="100" value="50" class="slider">
            <div class="slider-button"></div>
        </div>
        <div class="title-tag">第三卷：持槍軍人細節</div>
    </div>

    <div class="comparison-wrapper" id="vol-4">
        <div class="comparison-container">
            <div class="image-background"><img src="https://raw.githubusercontent.com/ChadChenYu/18/master/5.png"></div>
            <div class="image-foreground"><img src="https://raw.githubusercontent.com/ChadChenYu/18/master/6.png"></div>
            <input type="range" min="0" max="100" value="50" class="slider">
            <div class="slider-button"></div>
        </div>
        <div class="title-tag">第四卷：戴手錶的女孩</div>
    </div>

    <nav class="nav-menu">
        <div class="nav-title">畫廊導覽</div>
        <ul>
            <li><a href="#top">🔼 回到頂部</a></li>
            <li><a href="#vol-1">一、書房神韻</a></li>
            <li><a href="#vol-2">二、讀書女孩</a></li>
            <li><a href="#vol-3">三、持槍軍人</a></li>
            <li><a href="#vol-4">四、戴錶女孩</a></li>
        </ul>
    </nav>

    <script>
        document.querySelectorAll('.comparison-wrapper').forEach(wrapper => {
            const slider = wrapper.querySelector('.slider');
            const container = wrapper.querySelector('.comparison-container');
            
            slider.addEventListener('input', (e) => {
                container.style.setProperty('--pos', e.target.value + '%');
            });
        });
    </script>

</body>
</html>
